<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Preview Incompetech - EchoBot</title>
    <style>
        body {
            background-color: #0A0A0B;
            color: #E2E2E2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #4A0E0E;
            border-radius: 12px;
            padding: 20px;
            width: 80%;
            max-width: 900px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h1 {
            color: #C5A059;
            text-align: center;
            margin-bottom: 20px;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 8px;
            background: #fff;
        }
        .info {
            margin-top: 15px;
            font-size: 0.9em;
            color: #888;
            text-align: center;
        }

</head>
<body>
    <div class="container">
        <h1>EchoBot: Validação de Trilha (Incompetech)</h1>
        <p>Testando a pré-visualização da música via ISRC no Iframe:</p>
        <iframe src="https://incompetech.com/music/royalty-free/index.html?isrc=USUAN1100317"></iframe>
        <div class="info">
            Esta técnica permite que o usuário ouça a música antes de confirmar a mixagem final.
        </div>
    </div>
